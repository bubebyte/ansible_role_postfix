---
name: Role testing with Molecule

on:
  - push
  - pull_request

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          path: "${{ github.repository }}"
      - name: molecule
        uses: robertdebock/molecule-action@2.6.16
        with:
          command: lint
  test:
    needs:
      - lint
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        distro:
          - image: "docker-rockylinux9-ansible"
            namespace: "geerlingguy"
            tag: "latest"
          - image: "docker-rockylinux10-ansible"
            namespace: "geerlingguy"
            tag: "latest"
          - image: "docker-ubuntu2204-ansible"
            namespace: "geerlingguy"
            tag: "latest"
          - image: "docker-ubuntu2404-ansible"
            namespace: "geerlingguy"
            tag: "latest"
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          path: ansible_role_postfix

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Configure Docker for systemd
        run: |
          sudo mkdir -p /etc/docker
          echo '{
            "features": {
              "buildkit": true
            },
            "exec-opts": ["native.cgroupdriver=systemd"]
          }' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker || true

      - name: Install Docker
        uses: docker/setup-buildx-action@v3

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip3 install ansible molecule molecule-plugins[docker] docker

      - name: Test with molecule
        run: |
          cd ansible_role_postfix
          molecule test
        env:
          PY_COLORS: 1
          ANSIBLE_FORCE_COLOR: 1
          image: ${{ matrix.distro.image }}
          namespace: ${{ matrix.distro.namespace }}
          tag: ${{ matrix.distro.tag }}
