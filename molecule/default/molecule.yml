---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml
driver:
  name: docker
lint: |
  set -e
  yamllint -d "{extends: default, rules: {line-length: {max: 140, level: warning}}, ignore: .github/workflows/molecule.yml}" .
  ansible-lint --exclude .github
platforms:
  - name: "postfix-${image:-docker-rockylinux9-ansible}"
    image: "${namespace:-geerlingguy}/${image:-docker-rockylinux9-ansible}:${tag:-latest}"
    platform: "linux/amd64"
    command: ${docker_command:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
    tty: true
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/../"
  lint:
    name: ansible-lint
  playbooks:
    converge: converge.yml
verifier:
  name: ansible
